apiVersion: apps/v1
kind: Deployment
metadata:
  name: teach-react-app
  labels:
    app: teach-react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teach-react-app
  template:
    metadata:
      labels:
        app: teach-react-app
    spec:
      containers:
        - name: teach-react-app
          image: aravindnys/teach-react-app:e8b7b111
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

 